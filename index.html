<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>VocabLens</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (typeof pdfjsLib !== 'undefined')
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--accent:#c8a96e;--accent2:#7eb8c8;--text:#e8e4dc;--text2:#9a9590;--text3:#5a5652;--danger:#c86e6e;--success:#6ec88a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap;gap:6px;}
.logo{font-size:14px;color:var(--accent);letter-spacing:.1em;}
.logo span{color:var(--text3);}
.hr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:11px;color:var(--text2);}
.badge b{color:var(--accent);}
.btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;-webkit-appearance:none;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#0f0f0f;font-weight:500;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.main{display:flex;flex:1;overflow:hidden;}

/* Upload */
#upload-pane{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.drop-zone{width:100%;max-width:440px;border:1.5px dashed var(--border);border-radius:16px;padding:3rem 2rem;text-align:center;cursor:pointer;background:var(--surface);transition:all .2s;}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:#1c1810;}
.drop-icon{width:48px;height:48px;margin:0 auto 1rem;background:var(--surface2);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.drop-icon svg{width:22px;height:22px;stroke:var(--accent);fill:none;stroke-width:1.5;}
.drop-title{font-size:16px;color:var(--text);margin-bottom:6px;font-family:'Lora',serif;}
.drop-sub{font-size:12px;color:var(--text2);}
.drop-sub b{color:var(--accent2);}
.prog-wrap{width:100%;max-width:440px;margin-top:1.25rem;display:none;}
.prog-label{font-size:11px;color:var(--text2);margin-bottom:5px;}
.prog-bar{height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);transition:width .3s;width:0%;}

/* Reader */
#reader-pane{flex:1;display:none;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);}
.page-nav{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;font-size:11px;color:var(--text2);flex-wrap:wrap;}
.page-nav button{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text2);padding:3px 9px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;-webkit-appearance:none;}
.page-nav button:disabled{opacity:.3;}
.hint{margin-left:auto;color:var(--text3);font-size:11px;}
#canvas-wrap{flex:1;overflow:auto;background:#111;padding:1.5rem;display:flex;justify-content:center;align-items:flex-start;}
#canvas-scaler{display:inline-block;}
#page-canvas{display:block;box-shadow:0 4px 32px rgba(0,0,0,.6);border-radius:2px;cursor:crosshair;}

/* Word picker popup */
#word-picker{
  position:fixed;z-index:9000;
  background:#1c1c1c;border:1px solid #383838;
  border-radius:10px;padding:4px;
  min-width:130px;
  box-shadow:0 8px 28px rgba(0,0,0,.75);
  display:none;
  animation:fadeUp .12s ease;
}
.wp-item{
  padding:7px 12px;border-radius:6px;
  cursor:pointer;font-family:'Lora',serif;
  font-size:14px;color:var(--text);
  transition:background .1s;
  white-space:nowrap;
}
.wp-item:hover,.wp-item.active{background:var(--surface2);}
.wp-item b{color:var(--accent);}

/* Definition popup */
#word-popup{
  position:fixed;z-index:9001;
  background:#1c1c1c;border:1px solid #383838;
  border-radius:12px;padding:1rem 1.1rem;
  width:320px;max-width:calc(100vw - 24px);
  max-height:calc(100vh - 32px);overflow-y:auto;
  box-shadow:0 12px 40px rgba(0,0,0,.75);
  display:none;animation:fadeUp .15s ease;
  user-select:none;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.pw{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--accent);margin-bottom:2px;}
.pp{font-size:11px;color:var(--text3);margin-bottom:10px;}
.pmeaning{margin-bottom:9px;}
.pmnum{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;color:var(--accent);margin-bottom:3px;}
.pmtag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;border-radius:4px;padding:1px 6px;margin-bottom:3px;margin-left:3px;}
.pmtag.d{background:#1a2a1a;border:1px solid #2a3a2a;color:#6ec88a;}
.pmtag.f{background:#1a1a2a;border:1px solid #2a2a4a;color:var(--accent2);}
.pmdef{font-family:'Lora',serif;font-size:14px;line-height:1.75;color:var(--text);}
.pex{font-size:12px;color:var(--text2);font-style:italic;border-left:2px solid var(--border);padding-left:8px;margin-top:4px;line-height:1.6;}
.pnote{font-size:12px;color:var(--text2);line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.pload{font-size:12px;color:var(--text2);padding:6px 0;display:flex;align-items:center;gap:8px;}
.spinner{width:14px;height:14px;border:1.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.pa{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.pbtn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text2);-webkit-appearance:none;}
.pbtn.save{background:var(--accent);border-color:var(--accent);color:#0f0f0f;font-weight:500;}
.pbtn.saved{background:var(--surface2);border-color:var(--success);color:var(--success);}

/* Vocab pane */
#vocab-pane{width:280px;min-width:240px;display:none;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);}
.vh{padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:11px;color:var(--text3);letter-spacing:.1em;}
#vocab-list{flex:1;overflow-y:auto;}
.vi{padding:.65rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;}
.vi:hover{background:var(--surface2);}
.viw{font-family:'Lora',serif;font-size:14px;font-weight:600;color:var(--accent);margin-bottom:2px;}
.vid{font-size:11px;color:var(--text2);line-height:1.5;}
.vdel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;flex-shrink:0;padding:0;}
.vempty{padding:2rem 1rem;text-align:center;font-size:11px;color:var(--text3);line-height:2;}
.vfoot{padding:.75rem 1rem;border-top:1px solid var(--border);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:600px){#vocab-pane{display:none!important;}}
</style>
</head>
<body>
<header>
  <div class="logo">Vocab<span>Lens</span></div>
  <div class="hr">
    <input type="password" id="apikey-input" placeholder="sk-ant-..." style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;width:180px;">
    <button class="btn" id="btn-save-key">保存</button>
    <span id="key-status" style="font-size:11px;display:none;"></span>
    <div class="badge">saved: <b id="count">0</b></div>
    <button class="btn" id="reset-btn" style="display:none">← new</button>
    <button class="btn primary" id="csv-btn" disabled>CSV</button>
  </div>
</header>

<div class="main">
  <div id="upload-pane">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg></div>
      <div class="drop-title">ファイルをドロップ</div>
      <div class="drop-sub" style="margin-top:6px"><b>PDF</b> または <b>画像</b>（複数可）</div>
      <div class="drop-sub" style="margin-top:4px;color:var(--text3)">JPG · PNG · WEBP · PDF</div>
    </div>
    <input type="file" id="file-input" multiple accept=".pdf,image/*" style="display:none">
    <div class="prog-wrap" id="prog-wrap">
      <div class="prog-label" id="prog-label">読み込み中...</div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
  </div>

  <div id="reader-pane">
    <div class="page-nav">
      <button id="prev-btn" disabled>← prev</button>
      <span id="page-info">1 / 1</span>
      <button id="next-btn" disabled>next →</button>
      <span style="color:var(--text3);font-size:11px;">zoom</span>
      <input type="range" id="zoom-slider" min="30" max="200" value="100" step="5" style="width:80px;accent-color:var(--accent);">
      <span id="zoom-label" style="font-size:11px;color:var(--text2);min-width:32px;">100%</span>
      <span class="hint">単語をクリック → 意味</span>
    </div>
    <div id="canvas-wrap">
      <div id="canvas-scaler">
        <canvas id="page-canvas"></canvas>
      </div>
    </div>
  </div>

  <div id="vocab-pane">
    <div class="vh">WORD LIST</div>
    <div id="vocab-list"><div class="vempty" id="vempty">単語をクリックして保存しよう</div></div>
    <div class="vfoot"><button class="btn primary" style="width:100%" id="csv-dl-btn">CSV ダウンロード</button></div>
  </div>
</div>

<!-- Word picker popup -->
<div id="word-picker"></div>

<!-- Definition popup -->
<div id="word-popup">
  <div id="popup-handle" style="height:20px;margin:-1rem -1.1rem .5rem;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:center;cursor:grab;flex-shrink:0;">
    <div style="width:36px;height:4px;background:var(--border);border-radius:2px;"></div>
  </div>
  <div class="pw" id="pw"></div>
  <div class="pp" id="pp"></div>
  <div id="pbody"><div class="pload"><div class="spinner"></div>調べています...</div></div>
  <div class="pa" id="pa" style="display:none">
    <button class="pbtn" id="btn-close-popup">閉じる</button>
    <button class="pbtn save" id="btn-save-word">+ 保存</button>
  </div>
</div>

<script>
var API_URL = 'https://api.anthropic.com/v1/messages';
console.log('[VocabLens] version: 2026-03-28-v1');
var DICT_SYSTEM = 'You are an English dictionary for a Japanese reader. Respond ONLY in valid JSON (no markdown, no preamble): {"word":"string","phonetic":"IPA","meanings":[{"sense":"短い日本語ラベル","tag":"一般/IT/医学/etc.","definition":"一文の日本語説明"}],"note":"補足 or null","example":"one English sentence"}. Include 2-5 meanings.';

var pages = [], currentPage = 0, vocabList = [];
var currentWord = '', currentDef = '', currentEx = '';
var apiKey = '';
var clickX = 0, clickY = 0;
var zoomLevel = 100;

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btn-save-key').addEventListener('click', saveApiKey);
  document.getElementById('btn-close-popup').addEventListener('click', closePopup);
  document.getElementById('btn-save-word').addEventListener('click', saveWord);
  document.getElementById('reset-btn').addEventListener('click', resetApp);
  document.getElementById('csv-btn').addEventListener('click', exportCSV);
  document.getElementById('csv-dl-btn').addEventListener('click', exportCSV);
  document.getElementById('prev-btn').addEventListener('click', function(){ changePage(-1); });
  document.getElementById('next-btn').addEventListener('click', function(){ changePage(1); });
  document.getElementById('zoom-slider').addEventListener('input', function(){ setZoom(parseInt(this.value)); });

  var dz = document.getElementById('drop-zone');
  var fi = document.getElementById('file-input');
  dz.addEventListener('click', function(){ fi.click(); });
  dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('dragover'); });
  dz.addEventListener('drop', function(e){ e.preventDefault(); dz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
  fi.addEventListener('change', function(){ handleFiles(fi.files); });

  document.getElementById('canvas-wrap').addEventListener('click', onCanvasClick);
  initTouch();
  initPopupDrag();

  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') { closePopup(); closePicker(); }
  });
  document.addEventListener('mousedown', function(e) {
    var picker = document.getElementById('word-picker');
    var popup  = document.getElementById('word-popup');
    if (picker.style.display !== 'none' && !picker.contains(e.target)) closePicker();
    if (popup.style.display  !== 'none' && !popup.contains(e.target) && !e.target.closest('#canvas-wrap')) closePopup();
  });
});

// ── API Key ──
function saveApiKey() {
  var k = document.getElementById('apikey-input').value.trim();
  if (!k.startsWith('sk-ant-')) { showKeyStatus('sk-ant- で始まるキーを入力してください', 'var(--danger)'); return; }
  apiKey = k;
  showKeyStatus('✓ セット完了', 'var(--success)');
}
function getApiKey() { return apiKey || document.getElementById('apikey-input').value.trim(); }
function showKeyStatus(msg, color) {
  var el = document.getElementById('key-status');
  el.style.display = 'inline'; el.style.color = color; el.textContent = msg;
}

// ── Files ──
function handleFiles(files) {
  if (!files || !files.length) return;
  pages = [];
  setProgress('読み込み中...', 10);
  var arr = Array.prototype.slice.call(files);
  var idx = 0;
  function next() {
    if (idx >= arr.length) { setProgress('完了 — ' + pages.length + 'ページ', 100); setTimeout(showReader, 400); return; }
    var f = arr[idx++];
    setProgress('処理中: ' + f.name + ' (' + idx + '/' + arr.length + ')', 10 + (idx/arr.length)*85);
    if (f.type === 'application/pdf') loadPDF(f).then(next);
    else if (f.type.startsWith('image/')) loadImage(f).then(next);
    else next();
  }
  next();
}

function loadPDF(file) {
  return file.arrayBuffer().then(function(ab) {
    return pdfjsLib.getDocument({ data: ab }).promise;
  }).then(function(pdf) {
    var chain = Promise.resolve();
    for (var p = 1; p <= pdf.numPages; p++) {
      (function(pageNum) {
        chain = chain.then(function() {
          return pdf.getPage(pageNum).then(function(page) {
            var scale = 2;
            var vp = page.getViewport({ scale: scale });
            var c = document.createElement('canvas');
            c.width = vp.width; c.height = vp.height;
            return page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise.then(function() {
              return page.getTextContent().then(function(tc) {
                var words = extractWords(tc, vp);
                pages.push({ dataUrl: c.toDataURL('image/jpeg', 0.92), label: file.name + ' p.' + pageNum, words: words, hasText: words.length > 5 });
              });
            });
          });
        });
      })(p);
    }
    return chain;
  });
}

function extractWords(tc, vp) {
  var words = [];
  for (var i = 0; i < tc.items.length; i++) {
    var item = tc.items[i];
    if (!item.str.trim()) continue;
    var t = pdfjsLib.Util.transform(vp.transform, item.transform);
    var x = t[4], y = t[5];
    var fontH = Math.abs(t[3]);
    var itemW = item.width * Math.abs(vp.transform[0]);
    var top = y - fontH;
    // Split keeping whitespace to track offsets accurately
    var tokens = item.str.split(/(\s+)/);
    var charW = itemW / Math.max(item.str.length, 1);
    var offsetX = 0;
    for (var j = 0; j < tokens.length; j++) {
      var tok = tokens[j];
      if (!tok) continue;
      var tokW = tok.length * charW;
      if (!/^\s+$/.test(tok)) {
        var clean = tok.replace(/[^a-zA-Z'-]/g, '');
        if (clean.length >= 2) {
          words.push({ word: clean, raw: tok, x: x + offsetX, y: top, w: tokW, h: fontH });
        }
      }
      offsetX += tokW;
    }
  }
  return words;
}

function loadImage(file) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) { pages.push({ dataUrl: e.target.result, label: file.name, words: [], hasText: false }); resolve(); };
    reader.readAsDataURL(file);
  });
}

// ── Reader ──
function showReader() {
  document.getElementById('upload-pane').style.display = 'none';
  document.getElementById('reader-pane').style.display = 'flex';
  document.getElementById('vocab-pane').style.display = 'flex';
  document.getElementById('reset-btn').style.display = 'inline-block';
  renderPage(0);
}

function renderPage(idx) {
  currentPage = idx;
  document.getElementById('page-info').textContent = (idx+1) + ' / ' + pages.length;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === pages.length - 1;
  closePopup(); closePicker();
  var canvas = document.getElementById('page-canvas');
  var img = new Image();
  img.onload = function() {
    canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
    canvas.style.width = ''; canvas.style.height = '';
    canvas.getContext('2d').drawImage(img, 0, 0);
    requestAnimationFrame(applyZoom);
  };
  img.src = pages[idx].dataUrl;
}

function changePage(dir) {
  var next = currentPage + dir;
  if (next >= 0 && next < pages.length) renderPage(next);
}

function setZoom(val) {
  zoomLevel = val;
  document.getElementById('zoom-label').textContent = val + '%';
  applyZoom();
}

function applyZoom() {
  var canvas = document.getElementById('page-canvas');
  if (!canvas.width) return;
  canvas.style.width  = Math.round(canvas.width  * zoomLevel / 200) + 'px';
  canvas.style.height = 'auto';
}

// ── Click ──
function onCanvasClick(e) {
  if (document.getElementById('word-popup').contains(e.target)) return;
  if (document.getElementById('word-picker').contains(e.target)) return;
  var canvas = document.getElementById('page-canvas');
  var rect = canvas.getBoundingClientRect();
  if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) { closePopup(); closePicker(); return; }
  var scaleX = canvas.width / rect.width;
  var scaleY = canvas.height / rect.height;
  clickX = e.clientX; clickY = e.clientY;
  var cx = (e.clientX - rect.left) * scaleX;
  var cy = (e.clientY - rect.top)  * scaleY;
  handleWordAt(cx, cy, canvas);
}

function handleWordAt(cx, cy, canvas) {
  var pg = pages[currentPage];
  if (pg.hasText && pg.words.length > 0) {
    var candidates = getNearbyWords(pg.words, cx, cy, 5);
    if (candidates.length > 0) { showPicker(candidates, canvas); return; }
  }
  // Image fallback: crop and ask AI for word candidates
  var cw = 400, ch = 150;
  var cx0 = Math.max(0, cx-cw/2), cy0 = Math.max(0, cy-ch/2);
  var cw2 = Math.min(canvas.width-cx0, cw), ch2 = Math.min(canvas.height-cy0, ch);
  var crop = document.createElement('canvas');
  crop.width = cw2; crop.height = ch2;
  crop.getContext('2d').drawImage(canvas, cx0, cy0, cw2, ch2, 0, 0, cw2, ch2);
  getImageCandidates(crop.toDataURL('image/jpeg', 0.92), canvas);
}

function getImageCandidates(dataUrl, canvas) {
  var key = getApiKey();
  if (!key) { showPopup(clickX, clickY); showError('APIキーを入力して「保存」を押してください'); return; }
  // Show a small loading indicator in picker position
  var picker = document.getElementById('word-picker');
  picker.innerHTML = '<div class="wp-item" style="color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;align-items:center;gap:8px;"><div class="spinner"></div>読み取り中...</div>';
  var m = 8, pw = 160;
  var left = clickX + 12, top = clickY - 20;
  if (left + pw > window.innerWidth - m) left = clickX - pw - 12;
  left = Math.max(m, Math.min(left, window.innerWidth - pw - m));
  top  = Math.max(m, Math.min(top,  window.innerHeight - 60 - m));
  picker.style.left = left + 'px'; picker.style.top = top + 'px';
  picker.style.display = 'block';

  var xhr = new XMLHttpRequest();
  xhr.open('POST', API_URL, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('anthropic-version', '2023-06-01');
  xhr.setRequestHeader('anthropic-dangerous-direct-browser-access', 'true');
  xhr.setRequestHeader('x-api-key', key);
  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      if (data.error) { closePicker(); showPopup(clickX, clickY); showError(data.error.message || 'APIエラー'); return; }
      var raw = (data.content&&data.content[0]?data.content[0].text:'[]').replace(/```json|```/g,'').trim();
      var words = JSON.parse(raw);
      if (!Array.isArray(words) || words.length === 0) {
        closePicker(); showPopup(clickX, clickY); showError('単語が見つかりませんでした');return;
      }
      // Build fake word objects for showPicker
      var candidates = words.slice(0,5).map(function(w){ return { word: w, raw: w, x:0, y:0, w:0, h:0 }; });
      showPicker(candidates, canvas);
    } catch(e) { closePicker(); showPopup(clickX, clickY); showError('レスポンス解析エラー'); }
  };
  xhr.onerror = function() { closePicker(); showPopup(clickX, clickY); showError('通信エラー'); };
  xhr.send(JSON.stringify({
    model: 'claude-sonnet-4-20250514', max_tokens: 200,
    system: 'Extract English words from the image near the center. Respond ONLY with a valid JSON array of strings (no markdown, no explanation). Example: ["methodology","applied","research"]. List 3-5 English words closest to the center of the image.',
    messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:'image/jpeg',data:dataUrl.split(',')[1]}},
      {type:'text',text:'List the English words near the center of this image as a JSON array.'}
    ]}]
  }));
}

function getNearbyWords(words, cx, cy, n) {
  var bestLineY = null, bestLineDist = Infinity;
  for (var i = 0; i < words.length; i++) {
    var wcy = words[i].y + words[i].h / 2;
    if (Math.abs(cy - wcy) < bestLineDist) { bestLineDist = Math.abs(cy - wcy); bestLineY = wcy; }
  }
  var lineWords = [];
  for (var i = 0; i < words.length; i++) {
    var wcy = words[i].y + words[i].h / 2;
    if (Math.abs(wcy - bestLineY) < words[i].h * 1.2) {
      lineWords.push({ w: words[i], dx: Math.abs(cx - (words[i].x + words[i].w / 2)) });
    }
  }
  lineWords.sort(function(a, b){ return a.dx - b.dx; });
  var seen = {}, result = [];
  for (var i = 0; i < lineWords.length && result.length < n; i++) {
    var word = lineWords[i].w.word;
    if (!seen[word]) { seen[word] = true; result.push(lineWords[i].w); }
  }
  return result;
}

// ── Picker popup ──
function showPicker(candidates, canvas) {
  closePicker();
  var picker = document.getElementById('word-picker');
  picker.innerHTML = '';
  candidates.forEach(function(w) {
    var item = document.createElement('div');
    item.className = 'wp-item';
    item.innerHTML = '<b>' + w.word + '</b>';
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      closePicker();
      highlightWord(w, canvas);
      showPopup(clickX + 8, clickY);
      lookupByText(w.word);
    });
    item.addEventListener('touchend', function(e) {
      e.stopPropagation();
      closePicker();
      highlightWord(w, canvas);
      showPopup(clickX + 8, clickY);
      lookupByText(w.word);
    });
    picker.appendChild(item);
  });
  // Position to the right of click
  var m = 8;
  picker.style.display = 'block';
  var pw = picker.offsetWidth || 140;
  var ph = picker.offsetHeight || (candidates.length * 36 + 8);
  var left = clickX + 12;
  var top  = clickY - ph / 2;
  if (left + pw > window.innerWidth - m) left = clickX - pw - 12;
  left = Math.max(m, Math.min(left, window.innerWidth - pw - m));
  top  = Math.max(m, Math.min(top,  window.innerHeight - ph - m));
  picker.style.left = left + 'px';
  picker.style.top  = top + 'px';
}

function closePicker() {
  document.getElementById('word-picker').style.display = 'none';
}

function highlightWord(w, canvas) {
  var ctx = canvas.getContext('2d');
  ctx.save(); ctx.fillStyle = 'rgba(200,169,110,0.4)';
  ctx.fillRect(w.x, w.y, w.w, w.h); ctx.restore();
  var dataUrl = pages[currentPage].dataUrl;
  setTimeout(function(){ var img = new Image(); img.onload = function(){ ctx.drawImage(img,0,0); }; img.src = dataUrl; }, 700);
}

// ── Definition popup ──
function showPopup(x, y) {
  currentWord = ''; currentDef = ''; currentEx = '';
  document.getElementById('pw').textContent = '';
  document.getElementById('pp').textContent = '';
  document.getElementById('pbody').innerHTML = '<div class="pload"><div class="spinner"></div>調べています...</div>';
  document.getElementById('pa').style.display = 'none';
  var popup = document.getElementById('word-popup');
  popup.style.display = 'block';
  positionPopup(x, y);
}

function positionPopup(x, y) {
  var popup = document.getElementById('word-popup');
  var pw = popup.offsetWidth || 320;
  var ph = popup.offsetHeight || 200;
  var m = 10;
  var left = (x || clickX) + 14;
  var top  = (y || clickY) - ph / 2;
  if (left + pw > window.innerWidth - m) left = (x || clickX) - pw - 14;
  left = Math.max(m, Math.min(left, window.innerWidth - pw - m));
  top  = Math.max(m, Math.min(top,  window.innerHeight - ph - m));
  popup.style.left = left + 'px';
  popup.style.top  = top + 'px';
}

function closePopup() { document.getElementById('word-popup').style.display = 'none'; }

// ── API ──
function callAPI(payload, onSuccess) {
  var key = getApiKey();
  if (!key) { showError('APIキーを入力して「保存」を押してください'); return; }
  var xhr = new XMLHttpRequest();
  xhr.open('POST', API_URL, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('anthropic-version', '2023-06-01');
  xhr.setRequestHeader('anthropic-dangerous-direct-browser-access', 'true');
  xhr.setRequestHeader('x-api-key', key);
  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      if (data.error) { showError(data.error.message || 'APIエラー'); return; }
      onSuccess(data);
    } catch(ex) { showError('レスポンス解析エラー'); }
  };
  xhr.onerror = function() { showError('通信エラー'); };
  xhr.send(JSON.stringify(payload));
}

function showError(msg) {
  document.getElementById('pbody').innerHTML = '<div class="pload" style="color:var(--danger)">' + msg + '</div>';
  document.getElementById('pa').style.display = 'flex';
}

function lookupByText(word) {
  var cached = vocabList.filter(function(v){ return v.word.toLowerCase() === word.toLowerCase(); })[0];
  if (cached) {
    currentWord = cached.word; currentDef = cached.definition; currentEx = cached.example;
    renderPopupResult({ word: cached.word, phonetic:'', meanings:[], note:null, example: cached.example, definition: cached.definition });
    return;
  }
  callAPI({ model:'claude-sonnet-4-20250514', max_tokens:600, system:DICT_SYSTEM,
    messages:[{role:'user',content:'Define: "'+word+'"'}] }, renderResult);
}

function lookupByImage(dataUrl) {
  callAPI({ model:'claude-sonnet-4-20250514', max_tokens:600,
    system: DICT_SYSTEM + ' A cropped image is provided. Identify the English word closest to the center and define it.',
    messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:'image/jpeg',data:dataUrl.split(',')[1]}},
      {type:'text',text:'What English word is at the center? Define it.'}
    ]}] }, renderResult);
}

function renderResult(data) {
  try {
    var raw = (data.content && data.content[0] ? data.content[0].text : '{}').replace(/```json|```/g,'').trim();
    renderPopupResult(JSON.parse(raw));
  } catch(ex) { showError('レスポンス解析エラー'); }
}

function renderPopupResult(obj) {
  currentWord = obj.word || '';
  currentDef  = (obj.meanings||[]).map(function(m){ return m.definition; }).join(' / ') || obj.definition || '';
  currentEx   = obj.example || '';
  document.getElementById('pw').textContent = currentWord;
  document.getElementById('pp').textContent = obj.phonetic || '';
  var html = '';
  (obj.meanings||[]).forEach(function(m,i){
    html += '<div class="pmeaning"><span class="pmnum">'+(i+1)+'</span>'
      +(m.sense?'<span class="pmtag d">'+m.sense+'</span>':'')
      +(m.tag  ?'<span class="pmtag f">'+m.tag  +'</span>':'')
      +'<div class="pmdef">'+m.definition+'</div></div>';
  });
  if ((!obj.meanings||!obj.meanings.length) && (obj.definition||currentDef))
    html = '<div class="pmdef">'+(obj.definition||currentDef)+'</div>';
  if (obj.note)    html += '<div class="pnote">'+obj.note+'</div>';
  if (obj.example) html += '<div class="pex">'+obj.example+'</div>';
  document.getElementById('pbody').innerHTML = html;
  document.getElementById('pa').style.display = 'flex';
  var isSaved = vocabList.some(function(v){ return v.word.toLowerCase() === currentWord.toLowerCase(); });
  var sb = document.getElementById('btn-save-word');
  sb.textContent = isSaved ? '✓ 保存済み' : '+ 保存';
  sb.className = isSaved ? 'pbtn saved' : 'pbtn save';
  requestAnimationFrame(function(){ positionPopup(clickX + 14, clickY); });
}

function saveWord() {
  if (!currentWord || vocabList.some(function(v){ return v.word.toLowerCase() === currentWord.toLowerCase(); })) return;
  vocabList.push({ word: currentWord, definition: currentDef, example: currentEx });
  updateVocabUI();
  document.getElementById('btn-save-word').textContent = '✓ 保存済み';
  document.getElementById('btn-save-word').className = 'pbtn saved';
}

function updateVocabUI() {
  var list = document.getElementById('vocab-list');
  document.getElementById('count').textContent = vocabList.length;
  document.getElementById('csv-btn').disabled = vocabList.length === 0;
  document.getElementById('vempty').style.display = vocabList.length ? 'none' : 'block';
  list.querySelectorAll('.vi').forEach(function(el){ el.remove(); });
  vocabList.forEach(function(v, i) {
    var item = document.createElement('div'); item.className = 'vi';
    // Short definition: first sentence or first 40 chars
    var shortDef = v.definition ? v.definition.split('。')[0].substring(0, 40) : '';
    item.innerHTML = '<div style="flex:1;min-width:0"><div class="viw">'+v.word+'</div><div class="vid">'+shortDef+'</div></div>'
      + '<button class="vdel" data-idx="'+i+'">×</button>';
    list.appendChild(item);
  });
  list.querySelectorAll('.vdel').forEach(function(btn){
    btn.addEventListener('click', function(){ removeWord(parseInt(btn.dataset.idx)); });
  });
}

function removeWord(idx) { vocabList.splice(idx,1); updateVocabUI(); }

function exportCSV() {
  if (!vocabList.length) return;
  var rows = [['単語','意味（日本語）','例文']];
  vocabList.forEach(function(v){ rows.push([v.word, v.definition, v.example]); });
  var csv = rows.map(function(r){ return r.map(function(c){ return '"'+(c||'').replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = 'vocab_list.csv'; a.click();
}

// ── Touch ──
function initTouch() {
  var wrap = document.getElementById('canvas-wrap');
  var tX=0, tY=0, tT=0, tMoved=false, tMulti=false;
  var pDist=0, pZoom=100;
  wrap.addEventListener('touchstart', function(e){
    if (e.touches.length >= 2) {
      tMulti = true;
      pDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      pZoom = zoomLevel; return;
    }
    tX=e.touches[0].clientX; tY=e.touches[0].clientY; tT=Date.now(); tMoved=false; tMulti=false;
  }, {passive:true});
  wrap.addEventListener('touchmove', function(e){
    if (e.touches.length >= 2) {
      tMulti = true;
      var d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      var z = Math.round(Math.max(30, Math.min(200, pZoom*d/pDist)));
      setZoom(z); document.getElementById('zoom-slider').value = z; return;
    }
    if (Math.abs(e.touches[0].clientX-tX)>5 || Math.abs(e.touches[0].clientY-tY)>5) tMoved=true;
  }, {passive:true});
  wrap.addEventListener('touchend', function(e){
    if (e.touches.length > 0) return;
    if (tMulti) { tMulti=false; return; }
    if (tMoved) return;
    if (Date.now()-tT > 400) return;
    var tc = e.changedTouches[0];
    if (Math.abs(tc.clientX-tX)>10 || Math.abs(tc.clientY-tY)>10) return;
    var canvas = document.getElementById('page-canvas');
    var rect = canvas.getBoundingClientRect();
    if (tc.clientX<rect.left||tc.clientX>rect.right||tc.clientY<rect.top||tc.clientY>rect.bottom) { closePopup(); closePicker(); return; }
    clickX=tc.clientX; clickY=tc.clientY;
    var cx=(tc.clientX-rect.left)*(canvas.width/rect.width);
    var cy=(tc.clientY-rect.top)*(canvas.height/rect.height);
    handleWordAt(cx, cy, canvas);
  }, {passive:true});
}

// ── Popup drag (mouse) ──
function initPopupDrag() {
  var popup = document.getElementById('word-popup');
  var handle = document.getElementById('popup-handle');
  var drag=false, sx=0, sy=0, ol=0, ot=0;

  function startDrag(x, y) {
    drag=true; sx=x; sy=y;
    ol=parseInt(popup.style.left)||0; ot=parseInt(popup.style.top)||0;
  }
  function moveDrag(x, y) {
    if (!drag) return;
    var m=8;
    popup.style.left=Math.max(m,Math.min(ol+x-sx,window.innerWidth-popup.offsetWidth-m))+'px';
    popup.style.top =Math.max(m,Math.min(ot+y-sy,window.innerHeight-popup.offsetHeight-m))+'px';
  }

  // Mouse
  popup.addEventListener('mousedown', function(e){
    if (e.target.closest('.pa')||e.target.closest('#pbody')) return;
    startDrag(e.clientX, e.clientY); e.preventDefault();
  });
  document.addEventListener('mousemove', function(e){ moveDrag(e.clientX, e.clientY); });
  document.addEventListener('mouseup', function(){ drag=false; });

  // Touch - handle only to avoid blocking buttons
  handle.addEventListener('touchstart', function(e){
    if (e.touches.length !== 1) return;
    startDrag(e.touches[0].clientX, e.touches[0].clientY);
    e.stopPropagation();
  }, {passive:true});
  document.addEventListener('touchmove', function(e){
    if (!drag) return;
    moveDrag(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:true});
  document.addEventListener('touchend', function(){ drag=false; }, {passive:true});
}

function setProgress(msg, pct) {
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('prog-label').textContent=msg;
  document.getElementById('prog-fill').style.width=pct+'%';
}

function resetApp() {
  pages=[]; currentPage=0; vocabList=[];
  setZoom(100); document.getElementById('zoom-slider').value=100;
  document.getElementById('upload-pane').style.display='flex';
  document.getElementById('reader-pane').style.display='none';
  document.getElementById('vocab-pane').style.display='none';
  document.getElementById('reset-btn').style.display='none';
  document.getElementById('prog-wrap').style.display='none';
  document.getElementById('count').textContent='0';
  document.getElementById('csv-btn').disabled=true;
  document.getElementById('file-input').value='';
  closePopup(); closePicker(); updateVocabUI();
}
